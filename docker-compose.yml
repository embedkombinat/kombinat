services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: kombinat
      POSTGRES_PASSWORD: kombinat
      POSTGRES_DB: kombinat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kombinat"]
      interval: 5s
      timeout: 5s
      retries: 5

  kombinat:
    build: .
    ports:
    
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://kombinat:kombinat@postgres:5432/kombinat
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
